name: release-please

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Maintains a release PR off main. Merging it bumps the version in pyproject.toml,
  # updates CHANGELOG.md, tags vX.Y.Z, and publishes a GitHub Release.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # When a release was just created, build and publish to PyPI. This runs in the
  # push-to-main context rather than via a `release:` trigger because releases made
  # with GITHUB_TOKEN cannot trigger downstream workflows.
  #
  # rs-mock is pure Python, so the build is a simple `uv build` producing an sdist
  # and a universal wheel — no per-platform wheel matrix needed.
  #
  # Trusted Publishing lives in this top-level workflow (not a reusable one): OIDC
  # fails with `invalid-publisher` from inside a `workflow_call` workflow. Configure
  # the PyPI project's trusted publisher with workflow file `release-please.yml`
  # and environment `pypi`.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # OIDC Trusted Publishing
      contents: read
      attestations: write # build provenance
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build sdist + wheel
        run: uv build --out-dir dist

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
